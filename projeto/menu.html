<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu — Semana da Segurança</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body class="page-menu">

<div class="menu-screen">

  <!-- Botão Voltar (fixo no canto superior esquerdo) -->
  <button class="menu-btn-back clickable" onclick="goTo('index.html')">
    <img src="assets/icon-back.png" alt="Voltar">
  </button>

  <!-- Logo Honda -->
  <div class="menu-logo">
    <img src="assets/logo-honda.png" alt="Honda">
  </div>

  <!-- Título -->
  <p class="menu-title">Escolha uma opção<br>para continuar</p>

  <!-- Cards de opção -->
  <!-- Tablet/Desktop: ficam lado a lado · Celular: empilhados -->
  <div class="menu-cards">

    <div class="menu-card clickable" onclick="goTo('criar-sala.html')">
      <img src="assets/icon-criar.png" alt="">
      <span class="menu-card-label">Criar<br>uma sala</span>
    </div>

    <div class="menu-card clickable" onclick="goTo('entrar-sala.html')">
      <img src="assets/icon-entrar.png" alt="">
      <span class="menu-card-label">Entrar em<br>uma sala</span>
    </div>

  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="js/game.js"></script>
</body>
</html>
