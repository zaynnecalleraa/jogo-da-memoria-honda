<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrar na Sala — Semana da Segurança</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="page-screen">

  <header class="page-header">
    <a class="page-btn-back back-button" href="menu.html"><img src="assets/icon-back.png" alt="Voltar"></a>
    <div class="page-logo"><img src="assets/logo-honda.png" alt="Honda"></div>
  </header>

  <h1 class="page-title">Entrar na sala</h1>

  <div class="page-content" style="justify-content:center">
    <div class="form-card">
      <div class="form-label" style="text-transform:uppercase;text-align:center;margin-bottom:20px">INSIRA O CÓDIGO</div>

      <div class="code-boxes" style="justify-content:center;margin-bottom:24px">
        <input class="code-input code-input-box" type="text" maxlength="1" data-idx="0" inputmode="text" autocapitalize="characters">
        <input class="code-input code-input-box" type="text" maxlength="1" data-idx="1" inputmode="text" autocapitalize="characters">
        <input class="code-input code-input-box" type="text" maxlength="1" data-idx="2" inputmode="text" autocapitalize="characters">
        <input class="code-input code-input-box" type="text" maxlength="1" data-idx="3" inputmode="text" autocapitalize="characters">
        <input class="code-input code-input-box" type="text" maxlength="1" data-idx="4" inputmode="text" autocapitalize="characters">
      </div>

      <div class="btn-primary clickable" onclick="entrar()">ENTRAR</div>
    </div>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="js/game.js"></script>
<script>
const inputs = document.querySelectorAll('.code-input');
inputs.forEach((inp, i) => {
  inp.addEventListener('input', () => {
    inp.value = inp.value.toUpperCase();
    if (inp.value && i < inputs.length - 1) inputs[i + 1].focus();
  });
  inp.addEventListener('keydown', e => {
    if (e.key === 'Backspace' && !inp.value && i > 0) inputs[i - 1].focus();
  });
  inp.addEventListener('focus', () => { inp.style.borderColor = '#04a025'; });
  inp.addEventListener('blur', () => { inp.style.borderColor = '#026F18'; });
});

function entrar() {
  var code = '';
  inputs.forEach(function(i) { code += i.value; });
  if (code.length < 5) return;

  showModal('Digite seu nome', 'Seu nome', async function(name) {
    var ok = await entrarSalaFirebase(code, name);
    if (ok === 'lotada') {
      showConfirm('Sala lotada!', 'O número máximo de jogadores já foi atingido.', function() {});
      return;
    }
    if (!ok) {
      showConfirm('Sala não encontrada', 'O código "' + code + '" não existe. Verifique e tente novamente.', function() {});
      return;
    }
    saveState({ code: code, playerName: name, host: false });
    goTo('aguarde.html');
  });
}
</script>
</body>
</html>
