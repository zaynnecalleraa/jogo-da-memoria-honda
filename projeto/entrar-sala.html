<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=440,user-scalable=no">
<title>Entrar na Sala — Semana da Segurança</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="frame">
  <img class="bg" src="assets/fundo.png" alt="">
  <button class="btn-back" onclick="goTo('menu.html')"><img src="assets/icon-back.png" alt="Voltar"></button>
  <div class="logo-honda"><img src="assets/logo-honda.png" alt="Honda"></div>

  <!-- Título -->
  <div style="left:106px;top:220px;position:absolute;text-align:center;color:white;font-size:32px;font-family:Poppins;font-weight:600;line-height:40px">Entrar na sala</div>

  <!-- Card -->
  <div style="width:321px;height:251px;left:59px;top:289px;position:absolute;background:white;border-radius:12px"></div>
  <div style="left:134px;top:320px;position:absolute;text-align:center;color:#026F18;font-size:20px;font-family:Poppins;font-weight:500;line-height:25px">INSIRA O CÓDIGO</div>

  <!-- Input boxes -->
  <input class="code-input" type="text" maxlength="1" data-idx="0" style="width:50px;height:73px;left:85px;top:370px;position:absolute;border-radius:4px;border:4px solid #026F18;text-align:center;font-size:28px;font-family:Poppins;font-weight:700;color:#026F18;background:transparent" inputmode="text" autocapitalize="characters">
  <input class="code-input" type="text" maxlength="1" data-idx="1" style="width:50px;height:73px;left:140px;top:370px;position:absolute;border-radius:4px;border:4px solid #026F18;text-align:center;font-size:28px;font-family:Poppins;font-weight:700;color:#026F18;background:transparent" inputmode="text" autocapitalize="characters">
  <input class="code-input" type="text" maxlength="1" data-idx="2" style="width:50px;height:73px;left:195px;top:370px;position:absolute;border-radius:4px;border:4px solid #026F18;text-align:center;font-size:28px;font-family:Poppins;font-weight:700;color:#026F18;background:transparent" inputmode="text" autocapitalize="characters">
  <input class="code-input" type="text" maxlength="1" data-idx="3" style="width:50px;height:73px;left:250px;top:370px;position:absolute;border-radius:4px;border:4px solid #026F18;text-align:center;font-size:28px;font-family:Poppins;font-weight:700;color:#026F18;background:transparent" inputmode="text" autocapitalize="characters">
  <input class="code-input" type="text" maxlength="1" data-idx="4" style="width:50px;height:73px;left:305px;top:370px;position:absolute;border-radius:4px;border:4px solid #026F18;text-align:center;font-size:28px;font-family:Poppins;font-weight:700;color:#026F18;background:transparent" inputmode="text" autocapitalize="characters">

  <!-- Botão ENTRAR -->
  <div style="width:131px;height:38px;left:154px;top:478px;position:absolute;background:#FF0000;border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center" class="clickable" onclick="entrar()">
    <span style="text-align:center;color:white;font-size:20px;font-family:Poppins;font-weight:700">ENTRAR</span>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="js/game.js"></script>
<script>
// Auto-advance inputs
const inputs = document.querySelectorAll('.code-input');
inputs.forEach((inp, i) => {
  inp.addEventListener('input', () => {
    inp.value = inp.value.toUpperCase();
    if (inp.value && i < inputs.length - 1) inputs[i + 1].focus();
  });
  inp.addEventListener('keydown', e => {
    if (e.key === 'Backspace' && !inp.value && i > 0) inputs[i - 1].focus();
  });
  inp.addEventListener('focus', () => { inp.style.borderColor = '#04a025'; });
  inp.addEventListener('blur', () => { inp.style.borderColor = '#026F18'; });
});

function entrar() {
  let code = '';
  inputs.forEach(i => code += i.value);
  if (code.length < 5) return;

  showModal('Digite seu nome', 'Seu nome', function(name) {
    saveState({
      code: code,
      playerName: name,
      host: false,
      mode: 'quiz',
      timeLeft: 120,
      timeTotal: 120
    });
    goTo('aguarde.html');
  });
}
</script>
</body>
</html>
