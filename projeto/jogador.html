<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogando — Semana da Segurança</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="page-screen">

  <header class="page-header">
    <div class="page-logo"><img src="assets/logo-honda.png" alt="Honda"></div>
  </header>

  <div class="game-screen-wrap">

    <!-- Timer + Pares -->
    <div class="game-top-bar">
      <div class="game-info-badge">
        <img src="assets/icon-clock.png" alt="" style="width:22px;height:22px" onerror="this.outerHTML='⏱️'">
        <span id="timer">02:00</span>
      </div>
      <div class="game-info-badge">
        <span>Pares: <span id="pairs">0/8</span></span>
      </div>
    </div>

    <!-- Pontuação / instrução -->
    <p class="game-instruction" id="scoreDisplay">Encontre os pares antes do tempo acabar!</p>

    <!-- Board: grid + memBanner + combo -->
    <div class="game-board-wrap">
      <div id="memBanner" style="display:none;align-items:center;justify-content:center">
        <div style="background:rgba(2,80,12,0.93);border-radius:10px;padding:6px 24px;display:flex;align-items:center;gap:12px;box-shadow:0 4px 16px rgba(0,0,0,0.4)">
          <span style="color:white;font-size:16px;font-family:Poppins;font-weight:700;letter-spacing:1px">MEMORIZE!</span>
          <span id="memCount" style="color:#FFD700;font-size:22px;font-family:Poppins;font-weight:800;min-width:28px;text-align:center">10</span>
          <span style="color:rgba(255,255,255,0.6);font-size:14px;font-family:Poppins">seg</span>
        </div>
      </div>

      <div id="grid" class="card-grid"></div>
      <div class="combo" id="combo"></div>
    </div>

    <!-- Quiz overlay (position:fixed via CSS) -->
    <div class="quiz-overlay" id="quizOverlay">
      <div class="quiz-bg"></div>
      <div id="quizCard"></div>
    </div>

    <!-- Feedback overlay (position:fixed via CSS) -->
    <div class="feedback-overlay" id="feedbackOverlay">
      <img id="feedbackImg" src="" alt="">
    </div>

  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="js/game.js"></script>
<script>
var state = getState();
var code    = state.code       || '';
var myKey   = sessionStorage.getItem('hondaCurrentPlayerKey')  || state.playerKey  || '';
var myName  = sessionStorage.getItem('hondaCurrentPlayerName') || state.playerName || 'Jogador';
var MODE    = state.mode       || 'memory';

// ── Estado local ──────────────────────────────────────────────────────────────
var gameState   = null;
var deck        = [];
var gridBuilt   = false;
var currentPhase = null;
var processing  = false;
var localFlipped = [];
var localMatched = {};
var myScore     = 0;
var myPairs     = 0;
var combo       = 0;
var quizShowing = false;
var timerStarted = false;
var timerInterval = null;
var memTimeout  = null;
var gameEnded   = false;

// ── Grid ──────────────────────────────────────────────────────────────────────
function buildGrid() {
  var grid = document.getElementById('grid');
  grid.innerHTML = '';
  deck.forEach(function(card, idx) {
    var el = document.createElement('div');
    el.className = 'card';
    el.innerHTML =
      '<div class="card-inner">' +
        '<div class="card-face card-front"></div>' +
        '<div class="card-face card-back"><img src="' + card.img + '" alt="" onerror="this.style.background=\'#1a5c2e\'"></div>' +
      '</div>';
    (function(i) { el.addEventListener('click', function() { flip(i); }); })(idx);
    grid.appendChild(el);
  });
}

function showAllCardsUp() {
  document.querySelectorAll('.card').forEach(function(el) {
    if (!el.classList.contains('matched')) el.classList.add('flipped');
  });
}
function hideAllCardsUp() {
  document.querySelectorAll('.card').forEach(function(el) {
    if (!el.classList.contains('matched')) el.classList.remove('flipped');
  });
}
function setCardsClickable(yes) {
  document.querySelectorAll('.card').forEach(function(el) {
    el.style.cursor = (yes && !el.classList.contains('matched')) ? 'pointer' : 'default';
  });
}

// ── Flip & Match ──────────────────────────────────────────────────────────────
function flip(idx) {
  if (processing || currentPhase !== 'playing') return;
  var cards = document.querySelectorAll('.card');
  var el = cards[idx];
  if (!el || el.classList.contains('matched') || el.classList.contains('flipped')) return;
  if (localFlipped.length >= 2) return;

  el.classList.add('flipped');
  var newFlipped = localFlipped.concat([idx]);
  localFlipped = newFlipped;

  var upd = {}; upd['flipped'] = newFlipped;
  updateMyBoard(code, myKey, upd);

  if (newFlipped.length === 2) {
    processing = true;
    setCardsClickable(false);
    setTimeout(function() { checkMatch(newFlipped[0], newFlipped[1]); }, 800);
  }
}

function checkMatch(a, b) {
  var c1 = deck[a], c2 = deck[b];
  var cards = document.querySelectorAll('.card');

  if (c1 && c2 && c1.pairId === c2.pairId && c1.type !== c2.type) {
    combo++;
    var tl = getTimeLeft();
    var gain = 100 + Math.min(combo * 25, 100) + Math.floor(tl / 10) * 5;
    myScore += gain;
    myPairs++;

    cards[a].classList.add('matched');
    cards[b].classList.add('matched');
    localMatched[String(a)] = c1.pairId;
    localMatched[String(b)] = c1.pairId;
    localFlipped = [];

    if (combo >= 2) showCombo(combo);

    var upd = { flipped: [], score: myScore, matchedCount: myPairs };
    upd['matched/' + a] = c1.pairId;
    upd['matched/' + b] = c1.pairId;

    var isLast = myPairs >= 8;
    if (isLast) { upd.finished = true; upd.finishedAt = Date.now(); }

    if (MODE === 'quiz') {
      updateMyBoard(code, myKey, upd);
      showQuiz(c1.pairId, isLast);
    } else {
      updateMyBoard(code, myKey, upd).then(function() {
        processing = false;
        setCardsClickable(true);
        showFeedback(true);
        updateUI();
        if (isLast && !gameEnded) { gameEnded = true; setTimeout(endGame, 1400); }
      });
    }
  } else {
    combo = 0;
    setTimeout(function() {
      cards[a].classList.remove('flipped');
      cards[b].classList.remove('flipped');
      localFlipped = [];
      updateMyBoard(code, myKey, { flipped: [] }).then(function() {
        processing = false;
        setCardsClickable(true);
      });
    }, 600);
  }
}

// ── Timer ─────────────────────────────────────────────────────────────────────
function getTimeLeft() {
  if (!gameState || !gameState.timerStart) return (gameState ? gameState.timerTotal : 120) || 120;
  return Math.max(0, (gameState.timerTotal || 120) - Math.floor((Date.now() - gameState.timerStart) / 1000));
}

function updateTimerDisplay() {
  var left = getTimeLeft();
  var m = Math.floor(left / 60), s = left % 60;
  document.getElementById('timer').textContent = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  return left;
}

function startTimerTick() {
  if (timerStarted) return;
  timerStarted = true;
  timerInterval = setInterval(function() {
    var left = updateTimerDisplay();
    if (left <= 0 && !gameEnded) {
      gameEnded = true;
      endGame();
    }
  }, 500);
}

// ── UI ────────────────────────────────────────────────────────────────────────
function updateUI() {
  document.getElementById('pairs').textContent = myPairs + '/8';
  document.getElementById('scoreDisplay').textContent = 'Pontos: ' + myScore;
}

function showCombo(c) {
  var el = document.getElementById('combo');
  el.textContent = 'COMBO x' + c + '!';
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
  setTimeout(function() { el.classList.remove('show'); }, 1000);
}

function showFeedback(ok) {
  var ov = document.getElementById('feedbackOverlay');
  var img = document.getElementById('feedbackImg');
  img.src = ok ? 'assets/icon-correct.png' : 'assets/icon-wrong.png';
  img.onerror = function() { this.outerHTML = '<div style="font-size:100px">' + (ok ? '✅' : '❌') + '</div>'; };
  ov.classList.add('active');
  setTimeout(function() { ov.classList.remove('active'); }, 1200);
}

// ── Quiz ──────────────────────────────────────────────────────────────────────
function showQuiz(pairId, isLast) {
  var pair = PAIRS.find(function(p) { return p.id === pairId; });
  if (!pair) { finishQuiz(false, isLast); return; }

  var card = document.getElementById('quizCard');
  card.innerHTML =
    '<div style="text-align:center;color:#026F18;font-size:22px;font-family:Poppins;font-weight:700;margin-bottom:14px">PAR ENCONTRADO!</div>' +
    '<div style="display:flex;gap:12px;justify-content:center;margin-bottom:14px">' +
      '<img src="' + getCardImg(pairId,'sit') + '" style="width:clamp(70px,20vw,100px);height:clamp(70px,20vw,100px);border-radius:8px;object-fit:cover" onerror="this.style.background=\'#ccc\'">' +
      '<img src="' + getCardImg(pairId,'sol') + '" style="width:clamp(70px,20vw,100px);height:clamp(70px,20vw,100px);border-radius:8px;object-fit:cover" onerror="this.style.background=\'#ccc\'">' +
    '</div>' +
    '<div style="text-align:center;color:#026F18;font-size:15px;font-family:Poppins;font-weight:500;margin-bottom:14px;line-height:1.35">' + pair.quiz.q + '</div>' +
    '<div id="quizOpts"></div>' +
    '<div id="quizExp" style="background:#f0f7f1;border-radius:6px;padding:10px;margin-top:8px;color:#026F18;font-size:13px;line-height:1.4;display:none">' + pair.quiz.exp + '</div>';

  var opts = pair.quiz.opts.map(function(text, i) { return { text: text, origIdx: i }; });
  for (var si = opts.length - 1; si > 0; si--) {
    var sj = Math.floor(Math.random() * (si + 1));
    var tmp = opts[si]; opts[si] = opts[sj]; opts[sj] = tmp;
  }
  var shuffledCorrect = 0;
  for (var ci = 0; ci < opts.length; ci++) {
    if (opts[ci].origIdx === pair.quiz.c) { shuffledCorrect = ci; break; }
  }

  updateMyBoard(code, myKey, {
    quiz: {
      active: true,
      pairId: pairId,
      q: pair.quiz.q,
      opts: opts.map(function(o) { return o.text; }),
      correctIdx: shuffledCorrect,
      answeredIdx: -1
    }
  });

  var optsEl = document.getElementById('quizOpts');
  opts.forEach(function(o, i) {
    var btn = document.createElement('div');
    btn.style.cssText = 'width:100%;min-height:35px;background:#026F18;border-radius:3px;margin:0 auto 10px;display:flex;align-items:flex-start;padding:8px 16px;cursor:pointer;color:white;font-size:15px;font-family:Poppins;font-weight:500;line-height:1.3;box-sizing:border-box;overflow-wrap:break-word;word-break:break-word';
    btn.textContent = String.fromCharCode(65+i) + ') ' + o.text;
    (function(sel, correct, b, last) {
      b.addEventListener('click', function() { answerQuiz(sel, correct, b, last); });
    })(i, shuffledCorrect, btn, isLast);
    optsEl.appendChild(btn);
  });

  document.getElementById('quizOverlay').classList.add('active');
  quizShowing = true;
}

function answerQuiz(sel, correct, btn, isLast) {
  var all = document.querySelectorAll('#quizOpts > div');
  all.forEach(function(b) { b.style.pointerEvents = 'none'; b.style.opacity = '0.6'; });
  var ok = (sel === correct);
  if (ok) { myScore += 150; btn.style.background = '#04a025'; btn.style.opacity = '1'; }
  else     { btn.style.background = '#FF0000'; btn.style.opacity = '1'; all[correct].style.background = '#04a025'; all[correct].style.opacity = '1'; }
  document.getElementById('quizExp').style.display = 'block';

  updateMyBoard(code, myKey, { 'quiz/answeredIdx': sel });

  setTimeout(function() {
    document.getElementById('quizOverlay').classList.remove('active');
    quizShowing = false;
    processing = false;
    setCardsClickable(true);
    showFeedback(ok);
    updateMyBoard(code, myKey, { score: myScore, 'quiz/active': false });
    updateUI();
    if (isLast && !gameEnded) { gameEnded = true; setTimeout(endGame, 1400); }
  }, 2500);
}

// ── Memorização ───────────────────────────────────────────────────────────────
function startMemorizationCountdown(gs) {
  var memStart = gs.memorizeStart || Date.now();
  var memDuration = (gs.memorizeTime || 5) * 1000;
  clearTimeout(memTimeout);
  document.getElementById('memBanner').style.display = 'flex';

  if (gridBuilt) showAllCardsUp();

  function tick() {
    var remaining = Math.max(0, Math.ceil((memDuration - (Date.now() - memStart)) / 1000));
    document.getElementById('memCount').textContent = remaining;
    if (remaining > 0) memTimeout = setTimeout(tick, 300);
  }
  tick();
}

// ── Fim de jogo ───────────────────────────────────────────────────────────────
async function endGame() {
  clearInterval(timerInterval);

  var upd = { finished: true, score: myScore, matchedCount: myPairs };
  if (!upd.finishedAt) upd.finishedAt = Date.now();
  await updateMyBoard(code, myKey, upd);

  var boardsSnap = await db.ref('salas/' + code + '/boards').once('value');
  var boards = boardsSnap.val() || {};
  var myFinalScore = myScore;
  var pos = 1 + Object.keys(boards).filter(function(k) {
    return k !== myKey && (boards[k].score || 0) > myFinalScore;
  }).length;

  var timerTotal = gameState ? (gameState.timerTotal || 120) : 120;
  var timerStart = gameState ? (gameState.timerStart || 0) : 0;
  var elapsed = timerStart ? Math.min(Math.floor((Date.now() - timerStart) / 1000), timerTotal) : timerTotal;
  var m = Math.floor(elapsed / 60), s = elapsed % 60;

  await addToSalaRanking(code, myName, myFinalScore);
  await addToGeralRanking(myName, myFinalScore);
  if (myKey) await markPlayerPlayed(code, myKey, myFinalScore);

  var finalTime = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  var finalPairs = myPairs + '/8';

  sessionStorage.setItem('hondaFinalPos',      String(pos));
  sessionStorage.setItem('hondaFinalScore',    String(myFinalScore));
  sessionStorage.setItem('hondaFinalTime',     finalTime);
  sessionStorage.setItem('hondaFinalPairs',    finalPairs);
  sessionStorage.setItem('hondaFinalRoomCode', code);

  saveState({ finalPos: pos, finalScore: myFinalScore, finalTime: finalTime, finalPairs: finalPairs, finalRoomCode: code });

  goTo('parabens.html');
}

// ── Lê o deck do próprio board ─────────────────────────────────────────────────
function readOwnDeck() {
  if (!myKey || !firebaseReady) { setTimeout(readOwnDeck, 400); return; }
  db.ref('salas/' + code + '/boards/' + myKey + '/deck').once('value', function(snap) {
    var d = snap.val();
    if (d && !gridBuilt) {
      deck = toArray(d);
      buildGrid();
      gridBuilt = true;
      if (currentPhase === 'memorization') showAllCardsUp();
      else if (currentPhase === 'playing') { hideAllCardsUp(); setCardsClickable(true); }
    } else if (!d) {
      setTimeout(readOwnDeck, 500);
    }
  });
}
readOwnDeck();

// ── Listener principal ────────────────────────────────────────────────────────
listenGameState(code, function(gs) {
  if (!gs) return;
  gameState = gs;

  var phase = gs.phase;
  if (phase !== currentPhase) {
    currentPhase = phase;

    if (phase === 'memorization') {
      startMemorizationCountdown(gs);
    } else if (phase === 'playing') {
      document.getElementById('memBanner').style.display = 'none';
      clearTimeout(memTimeout);
      if (gridBuilt) hideAllCardsUp();
      setCardsClickable(true);
      startTimerTick();
      document.getElementById('scoreDisplay').textContent = 'Pontos: ' + myScore;
    } else if (phase === 'finished') {
      if (!gameEnded) { gameEnded = true; endGame(); }
    }
  }

  if (phase === 'playing' && gs.timerStart) updateTimerDisplay();
});
</script>
</body>
</html>
