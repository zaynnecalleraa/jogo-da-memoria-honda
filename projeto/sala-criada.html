<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sala Criada — Semana da Segurança</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="page-screen">

  <header class="page-header">
    <button class="page-btn-back clickable" onclick="goTo('menu.html')"><img src="assets/icon-back.png" alt="Voltar"></button>
    <div class="page-logo"><img src="assets/logo-honda.png" alt="Honda"></div>
  </header>

  <h1 class="page-title">Sala criada</h1>

  <div class="page-content">

    <!-- Código da sala -->
    <div class="form-card" style="margin-bottom:16px">
      <div class="form-label" style="text-transform:uppercase;text-align:center;margin-bottom:12px">COMPARTILHE ESTE CÓDIGO</div>
      <div id="codeBoxes" class="code-boxes" style="justify-content:center;margin-bottom:12px"></div>
      <div style="text-align:center;cursor:pointer;margin-bottom:4px" onclick="copyCode()">
        <img id="copyIcon" src="assets/icon-copy.png" alt="Copiar" style="width:40px;height:40px" onerror="this.outerHTML='<span style=font-size:30px>📋</span>'">
      </div>
      <div id="copyMsg" style="text-align:center;color:#026F18;font-size:12px;font-family:Poppins;font-weight:500;opacity:0;transition:opacity 0.3s">Código copiado!</div>
    </div>

    <!-- Jogadores -->
    <div class="form-card" style="margin-bottom:16px">
      <div class="form-label" style="text-align:center;margin-bottom:10px">Jogadores</div>
      <div id="playersList"></div>
    </div>

    <!-- Botão INICIAR -->
    <div id="btnIniciar" class="btn-primary clickable" onclick="iniciar()">INICIAR PARTIDA</div>

  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="js/game.js"></script>
<script>
var state = getState();
var code = state.code || 'XXXXX';
var willPlay = state.willPlay !== false;
var tvMode = state.tvMode || false;
var myMode = state.mode || 'memory';
var memorizeTime = state.memorizeTime || 0;

// Render code boxes
var boxesEl = document.getElementById('codeBoxes');
for (var i = 0; i < code.length; i++) {
  var box = document.createElement('div');
  box.className = 'code-box';
  box.textContent = code[i];
  boxesEl.appendChild(box);
}

// Registra o anfitrião como jogador se ele vai jogar
if (willPlay && state.playerName) {
  entrarSalaFirebase(code, state.playerName);
}

// Escuta jogadores em tempo real do nó salas/{code}/jogadores
function escutarJogadores() {
  var listEl = document.getElementById('playersList');
  if (!firebaseReady) {
    listEl.innerHTML = '<div style="padding:20px;text-align:center;color:rgba(2,111,24,0.35);font-size:14px;font-family:Poppins">Firebase não conectado</div>';
    return;
  }
  db.ref('salas/' + code + '/jogadores').on('value', function(snap) {
    var data = snap.val();
    if (!data) {
      listEl.innerHTML = '<div style="padding:20px;text-align:center;color:rgba(2,111,24,0.35);font-size:14px;font-family:Poppins">Aguardando jogadores...</div>';
      return;
    }
    var jogadores = [];
    Object.keys(data).forEach(function(k) { jogadores.push(data[k]); });
    var html = '';
    for (var i = 0; i < jogadores.length; i++) {
      html += '<div style="width:100%;min-height:36px;background:white;border-radius:4px;border:1px solid #e8e8e8;display:flex;align-items:center;gap:8px;padding:0 12px;margin-bottom:6px;box-sizing:border-box">' +
        '<span style="font-size:14px">👤</span>' +
        '<span style="color:#026F18;font-size:14px;font-family:Poppins;font-weight:500;flex:1">' + jogadores[i].name + '</span></div>';
    }
    listEl.innerHTML = html;
  });
}
escutarJogadores();

if (!willPlay && !tvMode) {
  document.getElementById('btnIniciar').textContent = 'VOLTAR AO INÍCIO';
  document.getElementById('btnIniciar').onclick = function() { goTo('menu.html'); };
}

function copyCode() {
  navigator.clipboard.writeText(code).catch(function(){});
  document.getElementById('copyMsg').style.opacity = '1';
  setTimeout(function() { document.getElementById('copyMsg').style.opacity = '0'; }, 2000);
}

async function iniciar() {
  if (tvMode) {
    var snap = await db.ref('salas/' + code + '/jogadores').once('value');
    var jogadores = snap.val() || {};
    var keys = Object.keys(jogadores);
    if (keys.length === 0) {
      alert('Aguarde pelo menos 1 jogador entrar!');
      return;
    }

    var entries = keys.map(function(k) {
      return { key: k, name: jogadores[k].name || 'Jogador', joinedAt: jogadores[k].joinedAt || 0 };
    }).sort(function(a, b) { return a.joinedAt - b.joinedAt; });

    var playerKeys = entries.map(function(e) { return e.key; });
    var timeTotal = state.timeTotal || 120;

    if (myMode === 'quizonly') {
      await iniciarPartidaFirebase(code);
      goTo('modo-tv.html');
    } else {
      await initGameStateV2(code, playerKeys, timeTotal, memorizeTime);
      await iniciarPartidaFirebase(code);
      goTo('telao.html');
    }
  } else if (willPlay) {
    await iniciarPartidaFirebase(code);
    goTo('jogo.html');
  } else {
    goTo('menu.html');
  }
}
</script>
</body>
</html>
