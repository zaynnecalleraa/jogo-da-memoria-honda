<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=440,user-scalable=no">
<title>Sala Criada — Semana da Segurança</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="frame">
  <img class="bg" src="assets/fundo.png" alt="">
  <button class="btn-back" onclick="goTo('criar-sala.html')"><img src="assets/icon-back.png" alt="Voltar"></button>
  <div class="logo-honda"><img src="assets/logo-honda.png" alt="Honda"></div>

  <div style="left:126px;top:180px;position:absolute;text-align:center;color:white;font-size:32px;font-family:Poppins;font-weight:600;line-height:40px">Sala criada</div>

  <div style="width:321px;height:220px;left:59px;top:240px;position:absolute;background:white;border-radius:12px"></div>
  <div style="left:84px;top:265px;position:absolute;color:#026F18;font-size:18px;font-family:Poppins;font-weight:500;text-transform:uppercase">COMPARTILHE ESTE CÓDIGO</div>
  <div id="codeBoxes" style="position:absolute;left:85px;top:310px;display:flex;gap:5px"></div>
  <div style="position:absolute;left:192px;top:405px;cursor:pointer" onclick="copyCode()">
    <img id="copyIcon" src="assets/icon-copy.png" alt="Copiar" style="width:40px;height:40px" onerror="this.outerHTML='<span style=font-size:30px>📋</span>'">
  </div>
  <div id="copyMsg" style="left:170px;top:445px;position:absolute;color:#026F18;font-size:12px;font-family:Poppins;font-weight:500;opacity:0;transition:opacity 0.3s">Código copiado!</div>

  <div style="width:321px;height:230px;left:59px;top:480px;position:absolute;background:rgba(255,255,255,0.90);border-radius:8px"></div>
  <div style="left:149px;top:495px;position:absolute;text-align:center;color:#026F18;font-size:18px;font-family:Poppins;font-weight:500">Jogadores</div>
  <div id="playersList" style="position:absolute;left:78px;top:525px;width:284px"></div>

  <div id="btnIniciar" style="width:220px;height:42px;left:110px;top:730px;position:absolute;background:#FF0000;border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center" class="clickable" onclick="iniciar()">
    <span style="color:white;font-size:18px;font-family:Poppins;font-weight:700">INICIAR PARTIDA</span>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="js/game.js"></script>
<script>
var state = getState();
var code = state.code || 'XXXXX';
var willPlay = state.willPlay !== false;

// Render code boxes
var boxesEl = document.getElementById('codeBoxes');
for (var i = 0; i < code.length; i++) {
  var box = document.createElement('div');
  box.style.cssText = 'width:50px;height:73px;border-radius:4px;border:4px solid #026F18;display:flex;align-items:center;justify-content:center;font-size:32px;font-family:Poppins;font-weight:700;color:#026F18';
  box.textContent = code[i];
  boxesEl.appendChild(box);
}

// Registra o anfitrião como jogador se ele vai jogar
if (willPlay && state.playerName) {
  entrarSalaFirebase(code, state.playerName);
}

// Escuta jogadores em tempo real do nó salas/{code}/jogadores
function escutarJogadores() {
  var listEl = document.getElementById('playersList');
  if (!firebaseReady) {
    listEl.innerHTML = '<div style="height:80px;display:flex;align-items:center;justify-content:center"><div style="color:rgba(2,111,24,0.35);font-size:14px;font-family:Poppins;font-weight:500">Firebase não conectado</div></div>';
    return;
  }
  db.ref('salas/' + code + '/jogadores').on('value', function(snap) {
    var data = snap.val();
    if (!data) {
      listEl.innerHTML = '<div style="height:80px;display:flex;align-items:center;justify-content:center"><div style="color:rgba(2,111,24,0.35);font-size:14px;font-family:Poppins;font-weight:500">Aguardando jogadores...</div></div>';
      return;
    }
    var jogadores = [];
    Object.keys(data).forEach(function(k) { jogadores.push(data[k]); });
    var html = '';
    for (var i = 0; i < jogadores.length; i++) {
      html += '<div style="width:284px;height:29px;background:white;border-radius:4px;display:flex;align-items:center;gap:8px;padding:0 10px;margin-bottom:6px">' +
        '<span style="font-size:12px">👤</span>' +
        '<span style="color:#026F18;font-size:14px;font-family:Poppins;font-weight:500;flex:1">' + jogadores[i].name + '</span></div>';
    }
    listEl.innerHTML = html;
  });
}
escutarJogadores();

if (!willPlay) {
  document.getElementById('btnIniciar').querySelector('span').textContent = 'VOLTAR AO INÍCIO';
  document.getElementById('btnIniciar').onclick = function() { goTo('index.html'); };
}

function copyCode() {
  navigator.clipboard.writeText(code).catch(function(){});
  document.getElementById('copyMsg').style.opacity = '1';
  setTimeout(function() { document.getElementById('copyMsg').style.opacity = '0'; }, 2000);
}

async function iniciar() {
  if (willPlay) {
    await iniciarPartidaFirebase(code);
    goTo('jogo.html');
  } else {
    goTo('index.html');
  }
}
</script>
</body>
</html>
