<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=440,user-scalable=no">
<title>Ranking da Sala — Semana da Segurança</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="frame">
  <img class="bg" src="assets/fundo.png" alt="">
  <button class="btn-back" onclick="history.length > 1 ? history.back() : goTo('index.html')"><img src="assets/icon-back.png" alt="Voltar"></button>
  <div class="logo-honda"><img src="assets/logo-honda.png" alt="Honda"></div>

  <!-- Título -->
  <div style="left:88px;top:220px;position:absolute;text-align:center;color:white;font-size:32px;font-family:Poppins;font-weight:600;line-height:40px">Ranking da sala</div>

  <!-- Podium + List (rendered by JS) -->
  <div id="podium"></div>
  <div id="rankList"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="js/game.js"></script>
<script>
async function loadRanking() {
  const state = getState();
  const roomCode = state.finalRoomCode || state.code || 'LOCAL';
  const players = await getSalaRanking(roomCode);
  renderRanking('podium', 'rankList', players);
}
loadRanking();
</script>
</body>
</html>
