<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogo — Semana da Segurança</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="page-screen">

  <header class="page-header">
    <button class="page-btn-back clickable" onclick="exitGame()"><img src="assets/icon-back.png" alt="Voltar"></button>
    <div class="page-logo"><img src="assets/logo-honda.png" alt="Honda"></div>
  </header>

  <div class="game-screen-wrap">

    <!-- Timer + Pares -->
    <div class="game-top-bar">
      <div class="game-info-badge">
        <img src="assets/icon-clock.png" alt="" style="width:22px;height:22px" onerror="this.outerHTML='⏱️'">
        <span id="timer">02:00</span>
      </div>
      <div class="game-info-badge">
        <span>Pares: <span id="pairs">0/8</span></span>
      </div>
    </div>

    <!-- Texto instrucional -->
    <p class="game-instruction" id="scoreDisplay">
      Acerte o maior número de pares no menor tempo possível para vencer! Encontre as combinações corretas com rapidez e atenção para conquistar a melhor pontuação.
    </p>

    <!-- Board: grid + memBanner + combo -->
    <div class="game-board-wrap">
      <div id="memBanner" style="display:none;align-items:center;justify-content:center">
        <div style="background:rgba(2,80,12,0.93);border-radius:10px;padding:6px 24px;display:flex;align-items:center;gap:12px;box-shadow:0 4px 16px rgba(0,0,0,0.4)">
          <span style="color:white;font-size:16px;font-family:Poppins;font-weight:700;letter-spacing:1px">MEMORIZE!</span>
          <span id="memCount" style="color:#FFD700;font-size:22px;font-family:Poppins;font-weight:800;min-width:28px;text-align:center">10</span>
          <span style="color:rgba(255,255,255,0.6);font-size:14px;font-family:Poppins">seg</span>
        </div>
      </div>

      <div id="grid" class="card-grid"></div>
      <div class="combo" id="combo"></div>
    </div>

    <!-- Quiz overlay (position:fixed via CSS) -->
    <div class="quiz-overlay" id="quizOverlay">
      <div class="quiz-bg"></div>
      <div id="quizCard"></div>
    </div>

    <!-- Feedback overlay (position:fixed via CSS) -->
    <div class="feedback-overlay" id="feedbackOverlay">
      <img id="feedbackImg" src="" alt="">
    </div>

  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="js/game.js"></script>
<script>
const state = getState();
const MODE = state.mode || 'memory';
let timeLeft = state.timeLeft || 120;
const timeTotal = state.timeTotal || 120;
let matched = 0;
let score = 0;
let combo = 0;
let flipped = [];
let processing = false;
let memorizing = false;
let timerId;
let memTimerId;
let cards = [];
let quizCorrect = 0;
const MEMORIZE_SECS = (MODE !== 'quizonly') ? (state.memorizeTime || 0) : 0;

// Build deck — shuffle aleatório a cada partida/jogador
function buildDeck() {
  const deck = [];
  PAIRS.forEach(p => {
    deck.push({ pairId: p.id, type: 'sit', img: getCardImg(p.id, 'sit'), quiz: p.quiz });
    deck.push({ pairId: p.id, type: 'sol', img: getCardImg(p.id, 'sol'), quiz: p.quiz });
  });
  return shuffleDeck(deck);
}

function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  cards.forEach((card, idx) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = idx;
    el.innerHTML = `
      <div class="card-inner">
        <div class="card-face card-front"></div>
        <div class="card-face card-back"><img src="${card.img}" alt="" onerror="this.style.background='#1a5c2e'"></div>
      </div>`;
    el.addEventListener('click', () => flip(idx));
    grid.appendChild(el);
  });
}

function flip(idx) {
  if (processing || memorizing) return;
  const el = document.querySelectorAll('.card')[idx];
  if (el.classList.contains('flipped') || el.classList.contains('matched')) return;
  if (flipped.length >= 2) return;
  el.classList.add('flipped');
  flipped.push(idx);
  if (flipped.length === 2) { processing = true; setTimeout(checkMatch, 800); }
}

function checkMatch() {
  const [a, b] = flipped;
  const c1 = cards[a], c2 = cards[b];
  const els = document.querySelectorAll('.card');

  if (c1.pairId === c2.pairId && c1.type !== c2.type) {
    els[a].classList.add('matched');
    els[b].classList.add('matched');
    matched++;
    combo++;
    const cb = Math.min(combo * 25, 100);
    const tb = Math.floor(timeLeft / 10) * 5;
    score += 100 + cb + tb;
    if (combo >= 2) showCombo(combo);
    updateUI();
    flipped = [];
    processing = false;

    if (MODE === 'quiz') {
      setTimeout(() => showQuiz(c1.pairId), 400);
    } else {
      showFeedback(true);
      checkWin();
    }
  } else {
    combo = 0;
    setTimeout(() => {
      els[a].classList.remove('flipped');
      els[b].classList.remove('flipped');
      flipped = [];
      processing = false;
    }, 600);
  }
}

function checkWin() {
  if (matched >= 8) setTimeout(endGame, 1200);
}

function showCombo(c) {
  const el = document.getElementById('combo');
  el.textContent = `COMBO x${c}!`;
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1000);
}

function showFeedback(ok) {
  const ov = document.getElementById('feedbackOverlay');
  const img = document.getElementById('feedbackImg');
  img.src = ok ? 'assets/icon-correct.png' : 'assets/icon-wrong.png';
  img.onerror = function () {
    this.outerHTML = `<div style="font-size:100px">${ok ? '✅' : '❌'}</div>`;
  };
  ov.classList.add('active');
  setTimeout(() => ov.classList.remove('active'), 1200);
}

// QUIZ
function showQuiz(pairId) {
  const pair = PAIRS.find(p => p.id === pairId);
  if (!pair) return;
  clearInterval(timerId);

  const card = document.getElementById('quizCard');
  card.innerHTML = `
    <div style="text-align:center;color:#026F18;font-size:24px;font-family:Poppins;font-weight:700;line-height:25px;margin-bottom:16px">PAR ENCONTRADO</div>
    <div style="display:flex;gap:12px;justify-content:center;margin-bottom:16px">
      <img src="${getCardImg(pairId, 'sit')}" style="width:clamp(70px,20vw,106px);height:clamp(70px,20vw,106px);border-radius:8px;object-fit:cover" onerror="this.style.background='#ccc'">
      <img src="${getCardImg(pairId, 'sol')}" style="width:clamp(70px,20vw,106px);height:clamp(70px,20vw,106px);border-radius:8px;object-fit:cover" onerror="this.style.background='#ccc'">
    </div>
    <div style="text-align:center;color:#026F18;font-size:16px;font-family:Poppins;font-weight:500;line-height:1.4;margin:0 auto 16px">${pair.quiz.q}</div>
    <div id="quizOpts"></div>
    <div id="quizExp" style="background:#f0f7f1;border-radius:6px;padding:12px;margin-top:8px;color:#026F18;font-size:13px;line-height:1.4;display:none">${pair.quiz.exp}</div>
  `;

  const optsEl = document.getElementById('quizOpts');
  pair.quiz.opts.forEach((o, i) => {
    const btn = document.createElement('div');
    btn.style.cssText = 'width:100%;min-height:35px;background:#026F18;border-radius:3px;margin:0 auto 10px;display:flex;align-items:flex-start;padding:8px 16px;cursor:pointer;color:white;font-size:16px;font-family:Poppins;font-weight:500;line-height:1.3;box-sizing:border-box;overflow-wrap:break-word;word-break:break-word';
    btn.textContent = `${String.fromCharCode(65 + i)}) ${o}`;
    btn.addEventListener('click', () => answerQuiz(i, pair.quiz.c, btn));
    optsEl.appendChild(btn);
  });

  document.getElementById('quizOverlay').classList.add('active');
}

function answerQuiz(sel, correct, btn) {
  const all = document.querySelectorAll('#quizOpts > div');
  all.forEach(b => { b.style.pointerEvents = 'none'; b.style.opacity = '0.6'; });

  if (sel === correct) {
    btn.style.background = '#04a025';
    btn.style.opacity = '1';
    score += 150;
    quizCorrect++;
  } else {
    btn.style.background = '#FF0000';
    btn.style.opacity = '1';
    all[correct].style.background = '#04a025';
    all[correct].style.opacity = '1';
  }

  document.getElementById('quizExp').style.display = 'block';

  setTimeout(() => {
    document.getElementById('quizOverlay').classList.remove('active');
    showFeedback(sel === correct);
    startTimer();
    checkWin();
  }, 2500);
}

// TIMER
function startTimer() {
  clearInterval(timerId);
  updateTimerDisplay();
  timerId = setInterval(() => {
    timeLeft--;
    updateTimerDisplay();
    if (timeLeft <= 0) { clearInterval(timerId); endGame(); }
  }, 1000);
}

function updateTimerDisplay() {
  const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
  document.getElementById('timer').textContent = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
}

function updateUI() {
  document.getElementById('pairs').textContent = `${matched}/8`;
}

// END GAME
async function endGame() {
  clearInterval(timerId);
  const used = timeTotal - timeLeft;
  const m = Math.floor(used / 60), s = used % 60;
  const tStr = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
  const playerName = state.playerName || 'Jogador';
  const roomCode = state.code || 'LOCAL';
  const tvModeOn = state.tvMode || false;
  const playerKey = state.playerKey || null;

  const salaPlayers = await addToSalaRanking(roomCode, playerName, score);
  await addToGeralRanking(playerName, score);
  const pos = salaPlayers.findIndex(p => p.name === playerName && p.score === score) + 1;

  if (tvModeOn && playerKey) {
    await markPlayerPlayed(roomCode, playerKey, score);
  }

  saveState({
    finalPos: pos,
    finalScore: score,
    finalTime: tStr,
    finalPairs: `${matched}/8`,
    finalRoomCode: roomCode
  });

  goTo(tvModeOn ? 'modo-tv.html' : 'parabens.html');
}

function exitGame() {
  showConfirm('Sair da partida?', 'Seu progresso será perdido.', function() {
    clearInterval(timerId);
    clearInterval(memTimerId);
    goTo('menu.html');
  });
}

function showAllCards() {
  document.querySelectorAll('.card').forEach(function(el) { el.classList.add('flipped'); });
}
function hideAllCards() {
  document.querySelectorAll('.card').forEach(function(el) { el.classList.remove('flipped'); });
}

function startMemorization(secs) {
  memorizing = true;
  showAllCards();
  var banner = document.getElementById('memBanner');
  banner.style.display = 'flex';
  var remaining = secs;
  document.getElementById('memCount').textContent = remaining;

  memTimerId = setInterval(function() {
    remaining--;
    document.getElementById('memCount').textContent = remaining;
    if (remaining <= 0) {
      clearInterval(memTimerId);
      banner.style.display = 'none';
      hideAllCards();
      memorizing = false;
      startTimer();
    }
  }, 1000);
}

// INIT
cards = buildDeck();
renderGrid();
updateUI();
if (MEMORIZE_SECS > 0) {
  startMemorization(MEMORIZE_SECS);
} else {
  startTimer();
}
</script>
</body>
</html>
