<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parabéns — Semana da Segurança</title>
<link rel="stylesheet" href="css/style.css">
<style>
  @keyframes trophyIn{from{transform:scale(0) rotate(-15deg);opacity:0}60%{transform:scale(1.1) rotate(3deg)}to{transform:scale(1) rotate(0);opacity:1}}
</style>
</head>
<body>
<div class="page-screen">

  <header class="page-header">
    <a class="page-btn-back back-button" href="menu.html"><img src="assets/icon-back.png" alt="Voltar"></a>
    <div class="page-logo"><img src="assets/logo-honda.png" alt="Honda"></div>
  </header>

  <div class="page-content">

    <h1 class="page-title">PARABÉNS!</h1>
    <p style="color:white;font-size:clamp(16px,4vw,22px);font-family:Poppins;font-weight:400;text-align:center;margin:0 0 16px;line-height:1.4">
      Você é fera em segurança.<br>Continue praticando!
    </p>

    <!-- Troféu -->
    <img src="assets/trophy.png" alt="Troféu" class="trophy-img"
      style="animation:trophyIn .7s ease-out"
      onerror="this.outerHTML='<div style=\'font-size:120px;text-align:center\'>🏆</div>'">

    <!-- Stats -->
    <div class="stats-list">
      <div class="stat-box">
        <span class="stat-label">Posição:</span>
        <span id="fPos" class="stat-value">5º Lugar</span>
      </div>
      <div class="stat-box">
        <span class="stat-label">Pontuação:</span>
        <span id="fScore" class="stat-value">190 pts</span>
      </div>
      <div class="stat-box">
        <span class="stat-label">Tempo:</span>
        <span id="fTime" class="stat-value">01:30</span>
      </div>
      <div class="stat-box">
        <span class="stat-label">Acertos:</span>
        <span id="fPairs" class="stat-value">6/8</span>
      </div>
    </div>

    <!-- Botões -->
    <div class="btn-primary clickable" style="margin-top:8px" onclick="goTo('ranking-sala.html')">VER RANKING DA SALA</div>
    <div style="width:100%;max-width:520px;height:44px;border-radius:5px;border:3px solid #FF0000;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:12px;box-sizing:border-box" class="clickable" onclick="goTo('menu.html')">
      <span style="color:#FF0000;font-size:clamp(15px,4vw,18px);font-family:Poppins;font-weight:700">JOGAR NOVAMENTE</span>
    </div>

  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="js/game.js"></script>
<script>
const state = getState();
const fPos   = sessionStorage.getItem('hondaFinalPos')   || state.finalPos   || '5';
const fScore = sessionStorage.getItem('hondaFinalScore') || state.finalScore || '190';
const fTime  = sessionStorage.getItem('hondaFinalTime')  || state.finalTime  || '01:30';
const fPairs = sessionStorage.getItem('hondaFinalPairs') || state.finalPairs || '6/8';
document.getElementById('fPos').textContent   = fPos + 'º Lugar';
document.getElementById('fScore').textContent = fScore + ' pts';
document.getElementById('fTime').textContent  = fTime;
document.getElementById('fPairs').textContent = fPairs;
</script>
</body>
</html>
