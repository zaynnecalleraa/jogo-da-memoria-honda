<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ranking Geral — Semana da Segurança</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="page-screen">

  <header class="page-header">
    <a class="page-btn-back back-button" href="index.html"><img src="assets/icon-back.png" alt="Voltar"></a>
    <div class="page-logo"><img src="assets/logo-honda.png" alt="Honda"></div>
  </header>

  <h1 class="page-title">Ranking geral</h1>

  <div class="page-content">
    <div class="ranking-outer">
      <div id="podium"></div>
      <div id="rankList"></div>
    </div>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="js/game.js"></script>
<script>
async function loadRanking() {
  const players = await getGeralRanking();
  renderRanking('podium', 'rankList', players);
}
loadRanking();
</script>
</body>
</html>
