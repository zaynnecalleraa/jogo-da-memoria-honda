<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aguarde — Semana da Segurança</title>
<link rel="stylesheet" href="css/style.css">
<style>
  .dot{width:10px;height:10px;background:#fff;border-radius:50%;display:inline-block;margin:0 4px;animation:dotPulse 1.4s infinite ease-in-out}
  .dot:nth-child(2){animation-delay:.2s}
  .dot:nth-child(3){animation-delay:.4s}
  @keyframes dotPulse{0%,80%,100%{opacity:.3;transform:scale(.8)}40%{opacity:1;transform:scale(1.2)}}
</style>
</head>
<body>
<div class="page-screen">

  <header class="page-header">
    <button class="page-btn-back clickable" onclick="goTo('menu.html')"><img src="assets/icon-back.png" alt="Voltar"></button>
    <div class="page-logo"><img src="assets/logo-honda.png" alt="Honda"></div>
  </header>

  <div class="page-content" style="justify-content:center;text-align:center">
    <h1 class="wait-title">Aguarde...</h1>
    <p class="wait-subtitle" id="subtitle">Em breve o anfitrião<br>iniciará a partida.</p>
    <div style="margin-top:24px">
      <span class="dot"></span><span class="dot"></span><span class="dot"></span>
    </div>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="js/game.js"></script>
<script>
var state = getState();
var code = state.code || '';
var tvMode = state.tvMode || false;
var myMode = state.mode || 'memory';
var myName = state.playerName || '';

function irParaJogo() {
  if (myMode === 'quizonly') goTo('quiz.html');
  else if (tvMode) goTo('jogador.html');
  else goTo('jogo.html');
}

escutarInicioPartida(code, function() {
  irParaJogo();
});
</script>
</body>
</html>
