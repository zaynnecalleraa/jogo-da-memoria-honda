<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Criar Sala — Semana da Segurança</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="page-screen">

  <header class="page-header">
    <button class="page-btn-back clickable" onclick="goTo('menu.html')"><img src="assets/icon-back.png" alt="Voltar"></button>
    <div class="page-logo"><img src="assets/logo-honda.png" alt="Honda"></div>
  </header>

  <h1 class="page-title">Criar sala</h1>

  <div class="page-content">
    <div class="form-card">

      <!-- Nome da sala -->
      <div class="form-row">
        <label class="form-label">Nome da sala:</label>
        <input id="roomName" type="text" class="form-input-full" placeholder="Ex: Turma A">
      </div>

      <!-- Modo de jogo -->
      <div class="form-row">
        <div class="form-label">Modo de jogo:</div>
        <div class="form-btn-group">
          <div id="modeMemory" class="form-btn active clickable" onclick="selMode('memory')">Jogo da<br>memória</div>
          <div id="modeQuiz"   class="form-btn clickable"        onclick="selMode('quiz')">Memória<br>+ quiz</div>
          <div id="modeQuizOnly" class="form-btn clickable"      onclick="selMode('quizonly')">Só<br>quiz</div>
        </div>
      </div>

      <!-- Memorizar por (ocultado no modo só quiz via JS) -->
      <div class="form-label" id="memLabel" style="margin-bottom:6px">Memorizar por:</div>
      <div class="form-btn-group" id="memBtns" style="margin-bottom:18px">
        <div id="memNao" class="form-btn clickable" onclick="selMem(0)">Não</div>
        <div id="mem5"   class="form-btn clickable" onclick="selMem(5)">5s</div>
        <div id="mem10"  class="form-btn active clickable" onclick="selMem(10)">10s</div>
        <div id="mem15"  class="form-btn clickable" onclick="selMem(15)">15s</div>
        <div id="mem20"  class="form-btn clickable" onclick="selMem(20)">20s</div>
      </div>

      <!-- Tempo de partida -->
      <div class="form-row">
        <div class="form-label">Tempo de partida:</div>
        <div class="form-time-inputs">
          <input id="timeMin" type="text" class="form-time-input" value="02" maxlength="2" inputmode="numeric">
          <span class="form-time-sep">:</span>
          <input id="timeSec" type="text" class="form-time-input" value="00" maxlength="2" inputmode="numeric">
        </div>
        <p class="form-hint">Máximo: 10:00 (10 minutos)</p>
      </div>

      <!-- Modo TV -->
      <div class="form-row">
        <div class="form-label">Modo TV (passar vez):</div>
        <div class="form-toggle-group">
          <div id="tvNo"  class="form-toggle active clickable" onclick="selTV(false)">Não</div>
          <div id="tvYes" class="form-toggle clickable"        onclick="selTV(true)">Sim</div>
        </div>
      </div>

      <!-- Máx. jogadores -->
      <div class="form-row">
        <div class="form-label">Máx. jogadores:</div>
        <div class="form-max-row">
          <input id="maxInput" type="text" class="form-max-input" inputmode="numeric" maxlength="4" placeholder="Sem limite" oninput="onMaxInput(this.value)">
          <div id="maxUnlim" class="form-max-unlim clickable" onclick="selMax(null)">∞</div>
        </div>
      </div>

      <!-- Você vai jogar? (oculto em modo TV via JS) -->
      <div class="form-row" id="playRow">
        <div class="form-label" id="playLabel">Você vai jogar?</div>
        <div class="form-toggle-group" id="playBtns">
          <div id="playYes" class="form-toggle active clickable" onclick="selPlay(true)">Sim, jogar</div>
          <div id="playNo"  class="form-toggle clickable"        onclick="selPlay(false)">Só criar</div>
        </div>
      </div>

      <!-- Botão CRIAR -->
      <div class="btn-primary clickable" style="margin-top:8px" onclick="criar()">CRIAR</div>

    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="js/game.js"></script>
<script>
var mode = 'memory';
var willPlay = true;
var tvMode = false;
var maxPlayers = null;
var memorizeTime = 10;

function selMode(m) {
  mode = m;
  var map = { memory:'modeMemory', quiz:'modeQuiz', quizonly:'modeQuizOnly' };
  Object.keys(map).forEach(function(k) {
    var el = document.getElementById(map[k]);
    var active = (k === m);
    el.style.background = active ? '#04a025' : '#026F18';
    el.style.borderColor = active ? '#04a025' : 'transparent';
  });
  var showMem = (m !== 'quizonly');
  document.getElementById('memLabel').style.display = showMem ? 'block' : 'none';
  document.getElementById('memBtns').style.display  = showMem ? 'flex'  : 'none';
}

function selMem(secs) {
  memorizeTime = secs;
  ['Nao','5','10','15','20'].forEach(function(v) {
    var val = v === 'Nao' ? 0 : parseInt(v);
    var el = document.getElementById('mem' + v);
    if (!el) return;
    var active = (val === secs);
    el.style.background  = active ? '#04a025' : '#026F18';
    el.style.borderColor = active ? '#04a025' : 'transparent';
  });
}

function selPlay(val) {
  willPlay = val;
  document.getElementById('playYes').style.background  = val  ? '#04a025' : '#026F18';
  document.getElementById('playYes').style.borderColor = val  ? '#04a025' : 'transparent';
  document.getElementById('playNo').style.background   = !val ? '#04a025' : '#026F18';
  document.getElementById('playNo').style.borderColor  = !val ? '#04a025' : 'transparent';
}

function selTV(val) {
  tvMode = val;
  document.getElementById('tvYes').style.background  = val  ? '#04a025' : '#026F18';
  document.getElementById('tvYes').style.borderColor = val  ? '#04a025' : 'transparent';
  document.getElementById('tvNo').style.background   = !val ? '#04a025' : '#026F18';
  document.getElementById('tvNo').style.borderColor  = !val ? '#04a025' : 'transparent';
  document.getElementById('playLabel').style.display = val ? 'none' : 'block';
  document.getElementById('playBtns').style.display  = val ? 'none' : 'flex';
  if (val) willPlay = false;
}

function selMax(val) {
  maxPlayers = val;
  document.getElementById('maxInput').value = '';
  document.getElementById('maxInput').placeholder = val === null ? 'Sem limite' : String(val);
  document.getElementById('maxUnlim').style.background  = val === null ? '#04a025' : '#026F18';
  document.getElementById('maxUnlim').style.borderColor = val === null ? '#04a025' : 'transparent';
}

function onMaxInput(raw) {
  var v = raw.replace(/\D/g, '');
  var num = parseInt(v);
  if (!v || num === 0) {
    maxPlayers = null;
    document.getElementById('maxUnlim').style.background  = '#04a025';
    document.getElementById('maxUnlim').style.borderColor = '#04a025';
  } else {
    maxPlayers = num;
    document.getElementById('maxUnlim').style.background  = '#026F18';
    document.getElementById('maxUnlim').style.borderColor = 'transparent';
  }
}

async function criar() {
  var name = document.getElementById('roomName').value.trim();
  if (!name) { document.getElementById('roomName').focus(); return; }
  var timeLeft = parseTimeFields(document.getElementById('timeMin'), document.getElementById('timeSec'));
  var code = generateCode();
  var memTime = (mode === 'quizonly') ? 0 : memorizeTime;
  if (tvMode) willPlay = false;

  saveState({ roomName:name, mode:mode, code:code, timeLeft:timeLeft, timeTotal:timeLeft, host:true, willPlay:willPlay, playerName:'', tvMode:tvMode, maxPlayers:maxPlayers, memorizeTime:memTime });
  await criarSalaFirebase(code, { roomName:name, mode:mode, timeTotal:timeLeft, maxPlayers:maxPlayers, tvMode:tvMode, memorizeTime:memTime });

  if (willPlay) {
    showModal('Digite seu nome', 'Seu nome', function(playerName) {
      saveState({ playerName:playerName });
      goTo('sala-criada.html');
    });
  } else {
    goTo('sala-criada.html');
  }
}

setupTimeInput(document.getElementById('timeMin'), document.getElementById('timeSec'));
selMem(10);
</script>
</body>
</html>
