<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=440,user-scalable=no">
<title>Criar Sala — Semana da Segurança</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="frame">
  <img class="bg" src="assets/fundo.png" alt="">
  <button class="btn-back" onclick="goTo('menu.html')"><img src="assets/icon-back.png" alt="Voltar"></button>
  <div class="logo-honda"><img src="assets/logo-honda.png" alt="Honda"></div>

  <div style="left:140px;top:180px;position:absolute;text-align:center;color:white;font-size:32px;font-family:Poppins;font-weight:600;line-height:40px">Criar sala</div>

  <div style="width:285px;height:500px;left:77px;top:250px;position:absolute;background:white;border-radius:12px"></div>

  <div style="left:104px;top:275px;position:absolute;color:#026F18;font-size:20px;font-family:Poppins;font-weight:500">Nome da sala:</div>
  <input id="roomName" type="text" style="width:228px;height:40px;left:104px;top:305px;position:absolute;background:#026F18;border-radius:3px;border:none;color:white;font-size:16px;font-family:Poppins;padding:0 12px" placeholder="Ex: Turma A">

  <div style="left:104px;top:362px;position:absolute;color:#026F18;font-size:20px;font-family:Poppins;font-weight:500">Modo de jogo:</div>
  <div id="modeMemory" style="width:110px;height:64px;left:105px;top:393px;position:absolute;background:#04a025;border-radius:3px;cursor:pointer;display:flex;align-items:center;justify-content:center;border:3px solid #04a025" onclick="selMode('memory')">
    <span style="text-align:center;color:white;font-size:15px;font-family:Poppins;font-weight:500;line-height:15px">Jogo da<br>memória</span>
  </div>
  <div id="modeQuiz" style="width:110px;height:64px;left:226px;top:393px;position:absolute;background:#026F18;border-radius:3px;cursor:pointer;display:flex;align-items:center;justify-content:center;border:3px solid transparent" onclick="selMode('quiz')">
    <span style="text-align:center;color:white;font-size:15px;font-family:Poppins;font-weight:500;line-height:15px">Memória<br>+ quiz</span>
  </div>

  <!-- Tempo — dois campos separados -->
  <div style="left:104px;top:475px;position:absolute;color:#026F18;font-size:20px;font-family:Poppins;font-weight:500">Tempo de partida:</div>
  <div style="left:104px;top:505px;position:absolute;display:flex;align-items:center;gap:4px">
    <input id="timeMin" type="text" value="02" maxlength="2" inputmode="numeric" style="width:70px;height:40px;background:#026F18;border-radius:3px;border:none;color:white;font-size:22px;font-family:Poppins;font-weight:600;text-align:center">
    <span style="color:#026F18;font-size:28px;font-weight:700">:</span>
    <input id="timeSec" type="text" value="00" maxlength="2" inputmode="numeric" style="width:70px;height:40px;background:#026F18;border-radius:3px;border:none;color:white;font-size:22px;font-family:Poppins;font-weight:600;text-align:center">
  </div>
  <div style="left:104px;top:552px;position:absolute;color:rgba(2,111,24,0.5);font-size:11px;font-family:Poppins;font-weight:400">Máximo: 10:00 (10 minutos)</div>

  <div style="left:104px;top:580px;position:absolute;color:#026F18;font-size:20px;font-family:Poppins;font-weight:500">Você vai jogar?</div>
  <div style="left:105px;top:610px;position:absolute;display:flex;gap:8px">
    <div id="playYes" style="width:110px;height:44px;background:#04a025;border-radius:3px;cursor:pointer;display:flex;align-items:center;justify-content:center;border:3px solid #04a025" onclick="selPlay(true)">
      <span style="color:white;font-size:15px;font-family:Poppins;font-weight:600">Sim, jogar</span>
    </div>
    <div id="playNo" style="width:110px;height:44px;background:#026F18;border-radius:3px;cursor:pointer;display:flex;align-items:center;justify-content:center;border:3px solid transparent" onclick="selPlay(false)">
      <span style="color:white;font-size:15px;font-family:Poppins;font-weight:600">Só criar</span>
    </div>
  </div>

  <div style="width:131px;height:38px;left:154px;top:680px;position:absolute;background:#FF0000;border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center" class="clickable" onclick="criar()">
    <span style="text-align:center;color:white;font-size:20px;font-family:Poppins;font-weight:700">CRIAR</span>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="js/game.js"></script>
<script>
var mode = 'memory';
var willPlay = true;

function selMode(m) {
  mode = m;
  document.getElementById('modeMemory').style.background = m === 'memory' ? '#04a025' : '#026F18';
  document.getElementById('modeMemory').style.borderColor = m === 'memory' ? '#04a025' : 'transparent';
  document.getElementById('modeQuiz').style.background = m === 'quiz' ? '#04a025' : '#026F18';
  document.getElementById('modeQuiz').style.borderColor = m === 'quiz' ? '#04a025' : 'transparent';
}

function selPlay(val) {
  willPlay = val;
  document.getElementById('playYes').style.background = val ? '#04a025' : '#026F18';
  document.getElementById('playYes').style.borderColor = val ? '#04a025' : 'transparent';
  document.getElementById('playNo').style.background = !val ? '#04a025' : '#026F18';
  document.getElementById('playNo').style.borderColor = !val ? '#04a025' : 'transparent';
}

async function criar() {
  var name = document.getElementById('roomName').value.trim();
  if (!name) { document.getElementById('roomName').focus(); return; }
  var timeLeft = parseTimeFields(document.getElementById('timeMin'), document.getElementById('timeSec'));
  var code = generateCode();

  saveState({
    roomName: name, mode: mode, code: code,
    timeLeft: timeLeft, timeTotal: timeLeft,
    host: true, willPlay: willPlay, playerName: ''
  });

  // Cria sala no Firebase
  await criarSalaFirebase(code, { roomName: name, mode: mode, timeTotal: timeLeft });

  if (willPlay) {
    showModal('Digite seu nome', 'Seu nome', function(playerName) {
      saveState({ playerName: playerName });
      goTo('sala-criada.html');
    });
  } else {
    goTo('sala-criada.html');
  }
}

setupTimeInput(document.getElementById('timeMin'), document.getElementById('timeSec'));
</script>
</body>
</html>
