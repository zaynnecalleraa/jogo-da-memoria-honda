<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modo TV — Semana da Segurança</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="page-screen">

  <header class="page-header">
    <a class="page-btn-back back-button" href="menu.html"><img src="assets/icon-back.png" alt="Voltar"></a>
    <div class="page-logo"><img src="assets/logo-honda.png" alt="Honda"></div>
  </header>

  <h1 class="page-title">Modo TV</h1>

  <div class="page-content">

    <p class="tv-code">Sala: <span id="codeDisplay" style="font-weight:700;letter-spacing:2px"></span></p>

    <!-- Lista de jogadores -->
    <div class="tv-players-card">
      <div class="tv-players-header">Jogadores</div>
      <div id="playerList"></div>
    </div>

    <!-- Dica para host -->
    <div id="hostHint" class="tv-hint" style="display:none">Toque em um jogador para selecioná-lo</div>

    <!-- Mensagem para jogador após terminar -->
    <div id="playerDoneBox" style="display:none">
      <div style="color:white;font-size:18px;font-family:Poppins;font-weight:500;margin-bottom:4px">Você finalizou!</div>
      <div id="playerDoneScore"></div>
    </div>

    <!-- Botão INICIAR VEZ (host only) -->
    <div id="btnIniciarVez" class="btn-primary clickable" style="display:none;opacity:0.35" onclick="iniciarVez()">INICIAR VEZ</div>

    <!-- Botão VER RANKING (quando todos jogaram) -->
    <div id="btnVerRanking" class="btn-primary clickable" style="display:none;margin-top:8px" onclick="goTo('ranking-sala.html')">VER RANKING</div>

  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="js/game.js"></script>
<script>
var state = getState();
var code = state.code || '';
var isHost = state.host || false;
var myName = state.playerName || '';
var justPlayed = !isHost && state.finalScore !== undefined;

var selectedPlayerKey = null;
var allPlayers = {};
var currentPlayingName = null;

document.getElementById('codeDisplay').textContent = code;

if (justPlayed) {
  document.getElementById('playerDoneBox').style.display = 'block';
  document.getElementById('playerDoneScore').textContent = (state.finalScore || 0) + ' pts';
}

if (isHost) {
  document.getElementById('btnIniciarVez').style.display = 'flex';
  document.getElementById('hostHint').style.display = 'block';
}

if (firebaseReady) {
  db.ref('salas/' + code + '/currentPlayer').on('value', function(snap) {
    currentPlayingName = snap.val() || null;
    renderPlayerList();
  });

  db.ref('salas/' + code + '/jogadores').on('value', function(snap) {
    allPlayers = snap.val() || {};
    renderPlayerList();
    checkAllDone();
  });
}

function renderPlayerList() {
  var listEl = document.getElementById('playerList');
  var keys = Object.keys(allPlayers);

  if (keys.length === 0) {
    listEl.innerHTML = '<div style="text-align:center;color:rgba(2,111,24,0.4);font-size:14px;font-family:Poppins;padding:24px">Nenhum jogador encontrado</div>';
    return;
  }

  var html = '';
  keys.forEach(function(k) {
    var p = allPlayers[k];
    var isDone = p.played;
    var isPlaying = (!isDone && currentPlayingName === p.name);
    var isSelected = (selectedPlayerKey === k);

    var bg = isDone ? '#e8f5e9' : isPlaying ? '#fff8e1' : '#f7f7f7';
    var border = isSelected && isHost ? '2px solid #04a025' : '1px solid #e8e8e8';
    var icon = isDone ? '✅' : isPlaying ? '🎮' : '⏳';
    var rightText = isDone ? ((p.score || 0) + ' pts') : (isPlaying ? 'Em jogo...' : 'Aguardando');
    var rightColor = isDone ? '#026F18' : isPlaying ? '#b56a00' : '#aaa';
    var canSelect = isHost && !isDone && !isPlaying;
    var cursor = canSelect ? 'pointer' : 'default';

    html += '<div style="background:' + bg + ';border:' + border + ';border-radius:6px;margin-bottom:6px;height:48px;display:flex;align-items:center;padding:0 12px;cursor:' + cursor + '"' +
      (canSelect ? ' onclick="selectPlayer(\'' + k + '\')"' : '') + '>' +
      '<span style="font-size:18px;margin-right:8px;flex-shrink:0">' + icon + '</span>' +
      '<span style="flex:1;color:#026F18;font-size:15px;font-family:Poppins;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + escHtml(p.name) + '</span>' +
      '<span style="color:' + rightColor + ';font-size:13px;font-family:Poppins;font-weight:600;flex-shrink:0">' + rightText + '</span>' +
      '</div>';
  });

  listEl.innerHTML = html;
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function selectPlayer(key) {
  if (!isHost) return;
  var p = allPlayers[key];
  if (!p || p.played || p.name === currentPlayingName) return;
  selectedPlayerKey = key;
  renderPlayerList();
  document.getElementById('btnIniciarVez').style.opacity = '1';
}

async function iniciarVez() {
  if (!selectedPlayerKey || !isHost) return;
  var p = allPlayers[selectedPlayerKey];
  if (!p) return;
  await setCurrentTVPlayer(code, p.name);
  selectedPlayerKey = null;
  document.getElementById('btnIniciarVez').style.opacity = '0.35';
}

function checkAllDone() {
  var keys = Object.keys(allPlayers);
  if (keys.length === 0) return;
  var allDone = keys.every(function(k) { return allPlayers[k].played; });
  if (allDone) {
    document.getElementById('btnVerRanking').style.display = 'flex';
    if (isHost) {
      document.getElementById('btnIniciarVez').style.display = 'none';
      document.getElementById('hostHint').style.display = 'none';
    }
  }
}
</script>
</body>
</html>
